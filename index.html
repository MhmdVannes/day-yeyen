function scrollBottom() {

function addLine(cls, text, targetLog = log) {
  const span = document.createElement('span');

  span.textContent = text;
  targetLog.appendChild(span);
  scrollBottom();
  // batasi panjang log saat fase error1

}

function clearBanner() { banner.innerHTML = ''; }
function hideMsgBox() { msgbox.style.display = 'none'; msgbody.textContent = ''; }

// ======================= BANNER HAPPY BIRTHDAY =======================

  clearBanner();
  hideMsgBox();
  let i = 0;
  function drawLine() {
    if (i < hbArt.length) {
      const pre = document.createElement('span');
      pre.className = 'line hb';

      banner.appendChild(pre);
      scrollBottom();
      i++;
      currentTimeout = setTimeout(drawLine, 38);
    } else {
      currentTimeout = setTimeout(callback, 2800);
    }
  }
  drawLine();
}

// ======================= PESAN RAHASIA =======================
function showSecretMessage(callback) {
  msgbox.style.display = 'block';
  msgbody.textContent = '';
  typingActive = true;
  scrollBottom();
  let idx = 0;
  function typeChar() {
    if (!typingActive) return;
    if (idx < secretMsg.length) {
      msgbody.textContent += secretMsg[idx];
      idx++;
      scrollBottom();
      const delay = secretMsg[idx-1] === '\n' ? 200 : 35;
      currentTimeout = setTimeout(typeChar, delay);
    } else {
      typingActive = false;
      currentTimeout = setTimeout(callback, 10000);
    }
  }
  typeChar();
}

// ======================= RESET LOOP =======================

  if (currentTimeout) clearTimeout(currentTimeout);
  typingActive = false;
  step = 0;
  err1_index = 0;
  err2_index = 0;
  log.innerHTML = '';
  clearBanner();
  hideMsgBox();
  scrollArea.scrollTop = 0;
  runSequence();
}

      showSecretMessage(() => {

      });
    }

    setTimeout(typeCommand, 65);
  } else {

      cmdIndex++;
      setTimeout(typeCommand, 300);
    }, 900);
  }
}
