<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Happy Birthday, Yeyen!</title>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green: #00ff41;
      --green-dim: #00cc33;
      --green-dark: #003d10;
      --pink: #ff69b4;
      --yellow: #ffe066;
      --red: #ff4444;
      --orange: #ffaa00;
      --bg: #000;
      --term-bg: #050505;
      --border: #1a1a1a;
      --sys: #555;
      --font: 'Share Tech Mono', monospace;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family: var(--font);
      /* Scanline overlay */
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 255, 65, 0.015) 2px,
        rgba(0, 255, 65, 0.015) 4px
      );
    }

    /* в”Җв”Җ Phone frame wrapper в”Җв”Җ */
    #phone {
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    /* CRT vignette */
    #phone::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
      z-index: 10;
    }

    /* в”Җв”Җ Status bar (fake phone) в”Җв”Җ */
    #statusbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 18px 4px;
      font-size: 11px;
      color: var(--sys);
      flex-shrink: 0;
      letter-spacing: 0.05em;
    }
    #statusbar .time { color: var(--green-dim); font-size: 12px; }
    #statusbar .icons { display: flex; gap: 6px; align-items: center; }
    .bar-icon { font-size: 10px; color: var(--sys); }

    /* в”Җв”Җ Terminal window в”Җв”Җ */
    #term {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      margin: 0 8px 8px;
      background: var(--term-bg);
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      box-shadow:
        0 0 0 1px #0a0a0a,
        0 0 30px rgba(0,255,65,0.06),
        inset 0 0 20px rgba(0,0,0,0.4);
    }

    /* в”Җв”Җ Title bar в”Җв”Җ */
    #titlebar {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 12px 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: #080808;
      border-radius: 12px 12px 0 0;
    }
    .dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .d-r { background: #ff5f57; box-shadow: 0 0 4px #ff5f5766; }
    .d-y { background: #febc2e; box-shadow: 0 0 4px #febc2e66; }
    .d-g { background: #28c840; box-shadow: 0 0 4px #28c84066; }
    #titletext {
      flex: 1;
      text-align: center;
      font-size: 10px;
      color: #333;
      letter-spacing: 0.08em;
    }

    /* в”Җв”Җ Scroll area в”Җв”Җ */
    #scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 10px 10px 4px;
      scroll-behavior: smooth;
    }
    #scroll-area::-webkit-scrollbar { width: 3px; }
    #scroll-area::-webkit-scrollbar-track { background: transparent; }
    #scroll-area::-webkit-scrollbar-thumb { background: #1a3a1a; border-radius: 3px; }

    /* в”Җв”Җ Log lines в”Җв”Җ */
    #log { }
    .line {
      display: block;
      line-height: 1.55;
      font-size: 11px;
      word-break: break-all;
      animation: fadein 0.15s ease;
    }
    @keyframes fadein { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; } }

    .err  { color: var(--red); }
    .warn { color: var(--orange); }
    .info { color: var(--green); }
    .sys  { color: var(--sys); }

    /* в”Җв”Җ ASCII art banner в”Җв”Җ */
    #banner { margin: 8px 0 4px; }
    .hb {
      display: block;
      white-space: pre;
      font-size: 5.2px;
      line-height: 1.3;
      color: var(--pink);
      text-shadow: 0 0 8px rgba(255,105,180,0.5);
      animation: glowpulse 2s ease-in-out infinite alternate;
      letter-spacing: 0.01em;
    }
    @keyframes glowpulse {
      from { text-shadow: 0 0 6px rgba(255,105,180,0.4); }
      to   { text-shadow: 0 0 14px rgba(255,105,180,0.8), 0 0 24px rgba(255,105,180,0.3); }
    }

    /* Stars burst animation on banner reveal */
    #stars {
      text-align: center;
      font-size: 14px;
      letter-spacing: 6px;
      margin: 6px 0;
      color: var(--yellow);
      animation: sparkle 1.5s ease-in-out infinite alternate;
      display: none;
    }
    @keyframes sparkle {
      from { opacity: 0.5; letter-spacing: 4px; }
      to   { opacity: 1; letter-spacing: 8px; }
    }

    /* в”Җв”Җ Message box в”Җв”Җ */
    #msgbox {
      margin: 8px 0 4px;
      background: #0d0d00;
      border: 1px solid var(--yellow);
      border-radius: 8px;
      padding: 12px 14px;
      display: none;
      box-shadow: 0 0 20px rgba(255,224,102,0.08);
      animation: msgappear 0.4s ease;
    }
    @keyframes msgappear {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #msgbox .sender {
      color: var(--yellow);
      font-size: 9.5px;
      margin-bottom: 8px;
      letter-spacing: 0.06em;
      opacity: 0.75;
    }
    #msgbox .body {
      color: var(--yellow);
      font-size: 12px;
      line-height: 1.8;
      white-space: pre-wrap;
    }
    #msgbox .cursor-msg {
      display: inline-block;
      width: 7px; height: 13px;
      background: var(--yellow);
      vertical-align: middle;
      margin-left: 1px;
      animation: blink 0.7s step-end infinite;
    }

    /* в”Җв”Җ Prompt bar в”Җв”Җ */
    #prompt-bar {
      padding: 8px 10px 10px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      background: #080808;
      border-radius: 0 0 12px 12px;
    }
    #prompt-line {
      font-size: 11px;
      color: var(--sys);
      display: flex;
      align-items: center;
      gap: 0;
      white-space: nowrap;
      overflow: hidden;
    }
    .ps1-user { color: var(--green); }
    .ps1-host { color: #00cc33; }
    .ps1-path { color: #4488ff; }
    #cmd-text {
      flex: 1;
      overflow: hidden;
      text-overflow: clip;
      color: #ccc;
    }
    .cursor {
      display: inline-block;
      width: 7px; height: 13px;
      background: var(--green);
      animation: blink 0.8s step-end infinite;
      vertical-align: middle;
      margin-left: 2px;
      flex-shrink: 0;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* в”Җв”Җ Progress bar line в”Җв”Җ */
    .progress-line { color: var(--sys); }

    /* в”Җв”Җ Bottom nav (fake phone) в”Җв”Җ */
    #bottomnav {
      height: env(safe-area-inset-bottom, 0px);
      flex-shrink: 0;
    }
  </style>
</head>

function addLine(cls, text) {
  const span = document.createElement('span');

  span.textContent = text;

      scrollBottom();

      // Insert text before cursor
      const ch = text[idx];
      msgbody.insertBefore(document.createTextNode(ch), msgcursor);
      idx++;
      scrollBottom();
      const delay = ch === '\n' ? 220 : 38;
      currentTO = setTimeout(typeChar, delay);
    } else {
      typingActive = false;
      msgcursor.style.display = 'none';
      currentTO = setTimeout(callback, 10000);
    }
  }
  typeChar();
}

// в”Җв”Җ Reset в”Җв”Җ
function resetAndRestart() {
  if (currentTO) clearTimeout(currentTO);
  typingActive = false;
  step = 0;
  err1i = 0; err2i = 0;
  log.innerHTML = '';
  clearBanner();
  hideMsgBox();
  scrollArea.scrollTop = 0;
  runSequence();
}

// в”Җв”Җ Main Sequence в”Җв”Җ
function runSequence() {
  if (step === 0) {
    if (err1i < errors1.length) {
      const [cls, txt] = errors1[err1i++];
      addLine(cls, txt);
      currentTO = setTimeout(runSequence, 80 + Math.random() * 120);
    } else {
      step = 1;
      showHappyBirthday(() => {
        step = 2;
        runSequence();
      });
    }
  } else if (step === 2) {
    if (err2i < errors2.length) {
      const [cls, txt] = errors2[err2i++];
      addLine(cls, txt);
      currentTO = setTimeout(runSequence, 90 + Math.random() * 130);
    } else {
      step = 3;
      showSecretMessage(() => resetAndRestart());
    }
  }
}

// в”Җв”Җ Command Prompt Animation в”Җв”Җ
function typeCommand() {
  const target = cmdTexts[cmdIndex % cmdTexts.length];
  if (cmdChar <= target.length) {
    cmdEl.textContent = target.slice(0, cmdChar);
    cmdChar++;
    setTimeout(typeCommand, 60);
  } else {
    setTimeout(() => {
      cmdChar = 0;
      cmdIndex++;
      setTimeout(typeCommand, 280);
    }, 950);
  }
}

// в”Җв”Җ Boot в”Җв”Җ
typeCommand();
runSequence();
</script>
